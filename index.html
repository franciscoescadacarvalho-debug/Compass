<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compass — Study Helper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --ink: #1E2A44;
    --paper: #EEF2F6;
    --card: #FFFFFF;
    --gold: #D9A441;
    --teal: #2F8F82;
    --error: #C24C3D;
    --line: #D7DEE6;
    --muted: #6B7688;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Work Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  #root { min-height: 100vh; }
  h1, h2 { font-family: 'Fraunces', serif; margin: 0; }
  button { font-family: 'Work Sans', sans-serif; }
  .app-root { min-height: 100vh; padding-bottom: 60px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .optional-tag { color: var(--gold); }

  /* Top nav */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 20; gap: 12px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; }
  .brand svg { color: var(--gold); }
  .nav-tabs { display: flex; gap: 4px; background: var(--paper); padding: 4px; border-radius: 12px; }
  .nav-tab {
    display: flex; align-items: center; gap: 6px; border: none; background: none; cursor: pointer;
    padding: 8px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; color: var(--muted);
  }
  .nav-tab.active { background: var(--ink); color: var(--paper); }
  .nav-account { display: flex; align-items: center; gap: 10px; }
  .nav-username { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .page-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 0; }

  /* Onboarding */
  .onboard-screen { max-width: 560px; margin: 0 auto; padding: 40px 20px 0; }
  .progress-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
  .dot-active { background: var(--gold); width: 20px; border-radius: 4px; }
  .dot-done { background: var(--teal); }
  .onboard-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 32px 28px; }
  .question { font-size: 26px; font-weight: 600; margin: 8px 0 20px; line-height: 1.25; }
  .input-field {
    width: 100%; font-family: 'Work Sans', sans-serif; font-size: 16px; padding: 12px 14px;
    border-radius: 10px; border: 1.5px solid var(--line); background: var(--paper); color: var(--ink); outline: none;
  }
  .input-field:focus { border-color: var(--gold); }
  .choice-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .choice-btn {
    padding: 10px 16px; border-radius: 999px; border: 1.5px solid var(--line);
    background: var(--card); color: var(--ink); cursor: pointer; font-size: 14px;
  }
  .choice-btn:hover { border-color: var(--gold); }
  .choice-selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 6px; background: var(--paper); border: 1px solid var(--line);
    padding: 6px 10px; border-radius: 999px; font-size: 13px;
  }
  .topic-chip { background: #FBEFDD; border-color: var(--gold); }
  .strength-chip { background: #EAF4F1; border-color: var(--teal); color: var(--teal); }
  .weakness-chip { background: #FBEDEA; border-color: var(--error); color: var(--error); }
  .tag-remove { border: none; background: none; cursor: pointer; font-size: 15px; color: var(--muted); line-height: 1; }
  .link-btn {
    border: none; background: none; color: var(--teal); cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 0; font-weight: 600;
  }
  .explain-box {
    margin-top: 16px; background: #F3F6F1; border-left: 3px solid var(--teal);
    padding: 12px 14px; border-radius: 8px; font-size: 14px; color: var(--ink);
  }
  .explain-loading { color: var(--muted); font-style: italic; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; gap: 10px; flex-wrap: wrap; }
  .nav-right { display: flex; gap: 10px; margin-left: auto; }
  .primary-btn, .secondary-btn, .ghost-btn {
    font-weight: 600; font-size: 14px; border-radius: 10px; padding: 10px 18px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; border: none;
  }
  .primary-btn { background: var(--ink); color: var(--paper); }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .secondary-btn { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); }
  .ghost-btn { background: none; color: var(--muted); border: 1.5px dashed var(--line); }
  .small { padding: 7px 12px; font-size: 13px; }
  .danger-btn { background: var(--error); color: #fff; }

  /* Dashboard */
  .dash-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; }
  .dash-title { font-size: 30px; margin-top: 4px; }
  .dash-sub { color: var(--muted); margin: 4px 0 0; }
  .compass-wrap { text-align: center; flex-shrink: 0; }
  .compass-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; }
  .compass-caption { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px 24px; margin-bottom: 20px; }
  .resumo-text { font-size: 15px; line-height: 1.5; margin: 8px 0 10px; }
  .week-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .day-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
  .day-label { font-family: 'Fraunces', serif; font-weight: 600; margin-bottom: 8px; }
  .block { border-top: 1px solid var(--line); padding-top: 8px; margin-top: 8px; }
  .block:first-of-type { border-top: none; margin-top: 0; }
  .block-disc { font-weight: 600; font-size: 14px; }
  .block-meta { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); margin: 2px 0; }
  .block-foco { font-size: 12px; color: var(--muted); }
  .dicas-list { margin: 8px 0 0; padding-left: 18px; font-size: 14px; line-height: 1.6; }
  .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
  .subject-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color .15s; }
  .subject-card:hover { border-color: var(--gold); }
  .subject-name { font-weight: 600; font-size: 15px; }
  .subject-pct { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--gold); margin: 6px 0 2px; }
  .subject-history { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .subject-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .sw-grid { grid-template-columns: 1fr; } }

  /* Subject detail */
  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .history-row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--line); padding: 8px 0; font-size: 13px; }
  .history-row:last-child { border-bottom: none; }

  /* Test */
  .option-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    text-align: left; font-size: 15px; padding: 12px 16px; border-radius: 10px; border: 1.5px solid var(--line);
    background: var(--card); color: var(--ink); cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--gold); }
  .option-correct { background: #EAF4F1; border-color: var(--teal); color: var(--teal); }
  .option-wrong { background: #FBEDEA; border-color: var(--error); color: var(--error); }

  /* Center screens */
  .center-screen { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px; color: var(--muted); padding: 20px; }
  .spin { animation: spin 1.4s linear infinite; color: var(--gold); }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .result-card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 36px; max-width: 460px; }
  .result-pct { font-family: 'Fraunces', serif; font-size: 56px; color: var(--gold); }
  .result-count { color: var(--muted); margin-top: -6px; }
  .feedback-text { font-size: 15px; line-height: 1.5; margin: 14px 0; color: var(--ink); }

  /* Settings */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }
  .field-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
  .field-group { margin-bottom: 16px; }
  .lang-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .save-bar { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .saved-msg { color: var(--teal); font-size: 13px; font-weight: 600; }
  .danger-zone { border: 1.5px dashed var(--error); border-radius: 14px; padding: 18px 20px; margin-top: 10px; }

  /* Agenda */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-nav-btn { border: 1.5px solid var(--line); background: var(--card); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--line); background: var(--card);
    display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
    font-size: 13px; position: relative; gap: 3px;
  }
  .cal-day.empty { border: none; background: none; cursor: default; }
  .cal-day.today { border-color: var(--gold); border-width: 2px; }
  .cal-day.selected { background: var(--ink); color: var(--paper); }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
  .event-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); padding: 10px 0; gap: 10px; }
  .event-item:last-child { border-bottom: none; }
  .event-date-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .event-title { font-weight: 600; font-size: 14px; }
  .event-subject { font-size: 12px; color: var(--muted); }
  .del-btn { border: none; background: none; color: var(--error); cursor: pointer; font-size: 16px; padding: 4px 8px; }
  .add-event-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-top: 6px; }
  @media (max-width: 720px) { .add-event-form { grid-template-columns: 1fr 1fr; } }

  /* Auth */
  .auth-screen { max-width: 420px; margin: 60px auto; padding: 0 20px; }
  .auth-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 32px 28px; }
  .auth-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .auth-toggle button { flex: 1; justify-content: center; }
  .auth-error { color: var(--error); font-size: 13px; margin-top: 8px; }
  .auth-note { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.5; }

  /* Trial / Paywall */
  .trial-banner { background: #FBEFDD; border: 1px solid var(--gold); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .paywall-screen { max-width: 640px; margin: 40px auto; padding: 0 20px 40px; }
  .plan-grid { display: flex; gap: 14px; flex-wrap: wrap; margin: 18px 0; }
  .plan-card { flex: 1; min-width: 180px; border: 1.5px solid var(--line); border-radius: 14px; padding: 18px; cursor: pointer; background: var(--card); }
  .plan-card.selected { border-color: var(--gold); background: #FBEFDD; }
  .plan-price { font-family: 'Fraunces', serif; font-size: 26px; margin: 6px 0; }
  .plan-old-price { text-decoration: line-through; color: var(--muted); font-size: 14px; margin-right: 8px; }
  .promo-row { display: flex; gap: 8px; margin-top: 10px; }
  .promo-input-wrap { position: relative; flex: 1; }
  .promo-input-wrap .input-field { width: 100%; padding-right: 42px; letter-spacing: 3px; }
  .promo-eye-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; color: var(--muted); padding: 4px; display: flex; align-items: center; }
  .promo-msg-ok { color: var(--teal); font-size: 13px; margin-top: 6px; }
  .promo-msg-err { color: var(--error); font-size: 13px; margin-top: 6px; }
  .demo-note { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.5; }
</style>

// ---------------- API helpers ----------------

async function callClaude(prompt, maxTokens = 2000) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!response.ok) throw new Error("AI request failed: " + response.status);
  const data = await response.json();
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
  if (!text) throw new Error("Empty AI response");
  return text;
}

function parseJSONLoose(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const objStart = clean.indexOf("{");
  const objEnd = clean.lastIndexOf("}");
  const arrStart = clean.indexOf("[");
  let candidate = clean;
  if (objStart !== -1 && objEnd !== -1) candidate = clean.slice(objStart, objEnd + 1);
  else if (arrStart !== -1) candidate = clean.slice(arrStart);
  return JSON.parse(candidate);
}

function formatPrice(n) {
  if (n <= 0) return "0";
  const fixed = n.toFixed(2);
  return fixed.endsWith(".00") ? fixed.slice(0, -3) : fixed;
}

// ---------------- Account / auth helpers ----------------

function simpleHash(str) {
  // NOTE: this is a lightweight, non-cryptographic hash used only to avoid
  // storing raw passwords as plain text in this prototype. It is NOT secure
  // and should never be used for anything beyond a demo.
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = (hash * 33) ^ str.charCodeAt(i);
  }
  return String(hash >>> 0);
}

function accountKey(username) { return `account_${username.trim().toLowerCase()}`; }

async function loadAccount(username) {
  try {
    const res = await window.storage.get(accountKey(username), true);
    return res ? JSON.parse(res.value) : null;
  } catch (e) { return null; }
}
async function saveAccount(account) {
  try { await window.storage.set(accountKey(account.username), JSON.stringify(account), true); }
  catch (e) { console.error("Save account error", e); }
}
async function loadSession() {
  try { const res = await window.storage.get("compass-session", false); return res ? res.value : null; }
  catch (e) { return null; }
}
async function saveSession(username) {
  try { await window.storage.set("compass-session", username, false); } catch (e) {}
}
async function clearSession() {
  try { await window.storage.delete("compass-session", false); } catch (e) {}
}

function newAccount(username, passwordHash) {
  return {
    username,
    passwordHash,
    createdAt: Date.now(),
    trialStart: Date.now(),
    subscription: { active: false, plan: null, price: null, promo: null },
    usedPromos: [],
    lang: "en",
    profile: {},
    plan: null,
    stats: {},
    events: [],
  };
}

function trialDaysLeft(account) {
  if (!account) return 0;
  const trialStart = account.trialStart || Date.now();
  const daysPassed = (Date.now() - trialStart) / (1000 * 60 * 60 * 24);
  return Math.max(0, Math.ceil(TRIAL_DAYS - daysPassed));
}
function computeAccess(account) {
  if (!account) return false;
  if (account.subscription && account.subscription.active) return true;
  return trialDaysLeft(account) > 0;
}
function isAdminUser(account) {
  return !!account && ADMIN_EMAILS.includes((account.username || "").trim().toLowerCase());
}

function getWeakTopics(stats, disciplina, profile) {
  const initial = (profile.dificuldadesPorDisciplina && profile.dificuldadesPorDisciplina[disciplina]) || [];
  const s = stats[disciplina];
  const fromHistory = [];
  if (s && s.historico) {
    s.historico.slice(-3).forEach((h) => { (h.topicos_fracos || h.topicos || []).forEach((tp) => fromHistory.push(tp)); });
  }
  return Array.from(new Set([...initial, ...fromHistory])).slice(0, 8);
}
function getStrongTopics(stats, disciplina) {
  const s = stats[disciplina];
  const arr = [];
  if (s && s.historico) s.historico.slice(-3).forEach((h) => (h.topicos_fortes || []).forEach((tp) => arr.push(tp)));
  return Array.from(new Set(arr)).slice(0, 8);
}
function getAggregateStrengthsWeaknesses(stats) {
  const strong = {}, weak = {};
  Object.keys(stats).forEach((subj) => {
    const s = stats[subj];
    if (!s || !s.historico) return;
    s.historico.slice(-3).forEach((h) => {
      (h.topicos_fortes || []).forEach((tp) => { strong[tp] = (strong[tp] || 0) + 1; });
      (h.topicos_fracos || h.topicos || []).forEach((tp) => { weak[tp] = (weak[tp] || 0) + 1; });
    });
  });
  const sortTop = (obj) => Object.keys(obj).sort((a, b) => obj[b] - obj[a]).slice(0, 6);
  return { strengths: sortTop(strong), weaknesses: sortTop(weak) };
}

// ---------------- Compass rose visual ----------------

function CompassRose({ t, subjects, stats, size = 170 }) {
  const withStats = subjects.filter((s) => stats[s] && typeof stats[s].percentagem === "number");
  let angle = 0;
  let target = null;
  if (withStats.length > 0) {
    target = withStats.reduce((worst, s) => (stats[s].percentagem < stats[worst].percentagem ? s : worst), withStats[0]);
    const idx = subjects.indexOf(target);
    angle = (360 / subjects.length) * idx;
  }
  return (
    <div className="compass-wrap" style={{ width: size }}>
      <svg viewBox="0 0 200 200" width={size} height={size}>
        <circle cx="100" cy="100" r="92" fill="var(--card)" stroke="var(--ink)" strokeWidth="2" />
        <circle cx="100" cy="100" r="70" fill="none" stroke="var(--line)" strokeWidth="1" />
        {subjects.map((s, i) => {
          const a = (360 / subjects.length) * i - 90;
          const rad = (a * Math.PI) / 180;
          const x = 100 + 78 * Math.cos(rad);
          const y = 100 + 78 * Math.sin(rad);
          return (
            <text key={s} x={x} y={y} textAnchor="middle" dominantBaseline="middle" className="compass-label" fill={s === target ? "var(--gold)" : "var(--ink)"}>
              {s.slice(0, 3).toUpperCase()}
            </text>
          );
        })}
        <g style={{ transform: `rotate(${angle}deg)`, transformOrigin: "100px 100px", transition: "transform 1s ease" }}>
          <polygon points="100,30 108,100 100,112 92,100" fill="var(--gold)" />
          <polygon points="100,170 108,100 100,88 92,100" fill="var(--ink)" />
        </g>
        <circle cx="100" cy="100" r="6" fill="var(--ink)" />
      </svg>
      <div className="compass-caption">{target ? <>{t.focus_label}: <strong>{target}</strong></> : t.take_test_focus}</div>
    </div>
  );
}

// ---------------- Auth ----------------

function AuthView({ t, lang, setLang, onAuth }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit() {
    setError("");
    const uname = username.trim();
    if (!uname || !password) { setError(t.login_error); return; }
    setBusy(true);
    try {
      if (mode === "register") {
        const existing = await loadAccount(uname);
        if (existing) { setError(t.username_taken); setBusy(false); return; }
        const account = newAccount(uname, simpleHash(password));
        account.lang = lang;
        await saveAccount(account);
        await saveSession(uname);
        onAuth(account);
      } else {
        const account = await loadAccount(uname);
        if (!account || account.passwordHash !== simpleHash(password)) { setError(t.login_error); setBusy(false); return; }
        await saveSession(uname);
        onAuth(account);
      }
    } catch (e) {
      setError(t.login_error);
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="auth-screen">
      <div className="brand" style={{ justifyContent: "center", marginBottom: 18 }}><IconCompass size={26} /> {t.brand}</div>
      <div className="auth-card">
        <div className="auth-toggle">
          <button className={`choice-btn ${mode === "login" ? "choice-selected" : ""}`} onClick={() => { setMode("login"); setError(""); }}>{t.login_title}</button>
          <button className={`choice-btn ${mode === "register" ? "choice-selected" : ""}`} onClick={() => { setMode("register"); setError(""); }}>{t.register_title}</button>
        </div>
        <div className="field-group">
          <label className="field-label">{t.username_label}</label>
          <input className="input-field" value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        </div>
        <div className="field-group">
          <label className="field-label">{t.password_label}</label>
          <input className="input-field" type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        </div>
        {error && <div className="auth-error">{error}</div>}
        <button className="primary-btn" style={{ width: "100%", justifyContent: "center", marginTop: 10 }} onClick={submit} disabled={busy}>
          {mode === "login" ? t.login_button : t.register_button}
        </button>
        <div className="lang-grid" style={{ marginTop: 18 }}>
          {Object.keys(LANGS).map((code) => (
            <button key={code} className={`choice-btn small ${lang === code ? "choice-selected" : ""}`} onClick={() => setLang(code)}>{LANGS[code]}</button>
          ))}
        </div>
        <p className="auth-note">
          {lang === "pt"
            ? "Nota: este login é apenas uma demonstração — as credenciais não usam encriptação forte e não devem ser reutilizadas de outros serviços."
            : "Note: this login is a lightweight demo — credentials aren't strongly encrypted, so please don't reuse a password from elsewhere."}
        </p>
      </div>
    </div>
  );
}

// ---------------- Paywall ----------------

function Paywall({ t, account, onSubscribe }) {
  const [planSel, setPlanSel] = useState("monthly");
  const [promo, setPromo] = useState("");
  const [promoResult, setPromoResult] = useState(null);
  const [showPromo, setShowPromo] = useState(false);

  function applyPromo() {
    const code = promo.trim().toLowerCase();
    if (!code) { setPromoResult(null); return; }
    if (code === "arjun") { setPromoResult({ code, discount: 100 }); return; }
    if (ONE_TIME_PROMO_CODES.includes(code)) {
      if ((account.usedPromos || []).includes(code)) { setPromoResult({ error: t.promo_used }); return; }
      setPromoResult({ code, discount: 25 });
      return;
    }
    setPromoResult({ error: t.promo_invalid });
  }

  const base = PRICES[planSel];
  const discount = promoResult && !promoResult.error ? promoResult.discount : 0;
  const final = Math.round(base * (1 - discount / 100) * 100) / 100;
  const isOneTime = !!(promoResult && !promoResult.error && ONE_TIME_PROMO_CODES.includes(promoResult.code));

  function confirm() {
    onSubscribe(planSel, final, promoResult && !promoResult.error ? promoResult.code : null, isOneTime);
  }

  return (
    <div className="paywall-screen">
      <h1 className="dash-title">{t.paywall_title}</h1>
      <p className="dash-sub">{t.paywall_sub}</p>
      <div className="plan-grid">
        <div className={`plan-card ${planSel === "monthly" ? "selected" : ""}`} onClick={() => { setPlanSel("monthly"); }}>
          <div className="eyebrow">{t.plan_monthly}</div>
          <div className="plan-price">€{formatPrice(PRICES.monthly)}<span style={{ fontSize: 13, color: "var(--muted)" }}>{t.per_month}</span></div>
        </div>
        <div className={`plan-card ${planSel === "yearly" ? "selected" : ""}`} onClick={() => { setPlanSel("yearly"); }}>
          <div className="eyebrow">{t.plan_yearly}</div>
          <div className="plan-price">€{formatPrice(PRICES.yearly)}<span style={{ fontSize: 13, color: "var(--muted)" }}>{t.per_year}</span></div>
        </div>
      </div>

      <div className="card">
        <div className="field-label">{t.promo_label}</div>
        <div className="promo-row">
          <div className="promo-input-wrap">
            <input className="input-field" type={showPromo ? "text" : "password"} value={promo}
              onChange={(e) => { setPromo(e.target.value); setPromoResult(null); }}
              onKeyDown={(e) => e.key === "Enter" && applyPromo()} />
            <button type="button" className="promo-eye-btn" onClick={() => setShowPromo(!showPromo)} aria-label="toggle promo code visibility">
              <IconEye open={!showPromo} size={16} />
            </button>
          </div>
          <button className="secondary-btn" onClick={applyPromo}>{t.promo_apply}</button>
        </div>
        {promoResult && promoResult.error && <div className="promo-msg-err">{promoResult.error}</div>}
        {promoResult && !promoResult.error && <div className="promo-msg-ok">{t.promo_success} (-{promoResult.discount}%)</div>}

        <div style={{ marginTop: 18 }}>
          {discount > 0 && <span className="plan-old-price">€{formatPrice(base)}</span>}
          <span className="plan-price">{final <= 0 ? t.free_forever : `€${formatPrice(final)}`}</span>
        </div>
        <button className="primary-btn" style={{ marginTop: 10 }} onClick={confirm}>{t.subscribe_now}</button>
        <p className="demo-note">{t.demo_payment_note}</p>
      </div>
    </div>
  );
}

// ---------------- Onboarding ----------------

function Onboarding({ lang, t, answers, setAnswers, onFinish }) {
  const [i, setI] = useState(0);
  const [tagInput, setTagInput] = useState("");
  const [explain, setExplain] = useState("");
  const [explainLoading, setExplainLoading] = useState(false);
  const [subIndex, setSubIndex] = useState(0);
  const key = STEP_ORDER[i];
  const type = STEP_TYPES[key];
  const stepText = t.steps[key];
  const optional = !!OPTIONAL_STEPS[key];
  const inputRef = useRef(null);
  const disciplinas = answers.disciplinas || [];

  useEffect(() => {
    setExplain(""); setTagInput(""); setSubIndex(0);
    if (inputRef.current) inputRef.current.focus();
  }, [i]);

  function setAns(k, v) { setAnswers((prev) => ({ ...prev, [k]: v })); }

  function next() {
    if ((type === "perDisciplinaTags" || type === "perDisciplina") && disciplinas.length > 0 && subIndex < disciplinas.length - 1) {
      setSubIndex(subIndex + 1);
      return;
    }
    if (i < STEP_ORDER.length - 1) setI(i + 1); else onFinish();
  }
  function back() {
    if ((type === "perDisciplinaTags" || type === "perDisciplina") && subIndex > 0) {
      setSubIndex(subIndex - 1);
      return;
    }
    if (i > 0) setI(i - 1);
  }
  function skipStep() {
    if (i < STEP_ORDER.length - 1) setI(i + 1); else onFinish();
  }

  async function handleNaoSei() {
    setExplainLoading(true); setExplain("");
    try {
      const contexto = (key === "tempoPorDisciplina" || key === "dificuldades") ? ` about the subject "${disciplinas[subIndex]}"` : "";
      const prompt = `A student is filling out a form and didn't understand this question: "${stepText.label}"${contexto}. Explain in 2-3 short, simple, friendly sentences what the question is asking, and give one example answer. Respond in ${LANG_NAME_FOR_AI[lang]}. Respond with plain text only, no JSON, no markdown.`;
      const text = await callClaude(prompt);
      setExplain(text.trim());
    } catch (e) { setExplain(t.explain_fallback); }
    finally { setExplainLoading(false); }
  }

  function canAdvance() {
    if (optional) return true;
    if (type === "tags") return disciplinas.length > 0;
    if (type === "perDisciplina") {
      const per = answers.tempoPorDisciplina || {};
      return disciplinas.every((d) => per[d]);
    }
    const v = answers[key];
    return v !== undefined && v !== null && String(v).trim() !== "";
  }

  function addTag() {
    const tg = tagInput.trim();
    if (!tg) return;
    const cur = answers.disciplinas || [];
    if (!cur.includes(tg)) setAns("disciplinas", [...cur, tg]);
    setTagInput("");
  }
  function removeTag(tg) { setAns("disciplinas", (answers.disciplinas || []).filter((x) => x !== tg)); }

  function addDificuldade() {
    const tg = tagInput.trim();
    if (!tg || disciplinas.length === 0) return;
    const cur = { ...(answers.dificuldadesPorDisciplina || {}) };
    const subj = disciplinas[subIndex];
    const list = cur[subj] || [];
    if (!list.includes(tg)) cur[subj] = [...list, tg];
    setAns("dificuldadesPorDisciplina", cur);
    setTagInput("");
  }
  function removeDificuldade(tg) {
    const cur = { ...(answers.dificuldadesPorDisciplina || {}) };
    const subj = disciplinas[subIndex];
    cur[subj] = (cur[subj] || []).filter((x) => x !== tg);
    setAns("dificuldadesPorDisciplina", cur);
  }

  return (
    <div className="onboard-screen">
      <div className="progress-row">
        {STEP_ORDER.map((s, idx) => (<div key={s} className={`dot ${idx === i ? "dot-active" : idx < i ? "dot-done" : ""}`} />))}
      </div>
      <div className="onboard-card">
        <div className="eyebrow">
          {t.question_of(i + 1, STEP_ORDER.length)}
          {optional && <span className="optional-tag"> · {t.optional}</span>}
          {(type === "perDisciplinaTags" || type === "perDisciplina") && disciplinas.length > 0 && (
            <span> · {disciplinas[subIndex]} ({subIndex + 1}/{disciplinas.length})</span>
          )}
        </div>
        <h2 className="question">{stepText.label}</h2>

        {type === "text" && (
          <input ref={inputRef} className="input-field" type="text" placeholder={stepText.placeholder}
            value={answers[key] || ""} onChange={(e) => setAns(key, e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && canAdvance() && next()} />
        )}
        {type === "number" && (
          <input ref={inputRef} className="input-field" type="number" placeholder={stepText.placeholder}
            value={answers[key] || ""} onChange={(e) => setAns(key, e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && canAdvance() && next()} />
        )}
        {type === "choice" && key === "ano" && (
          <div className="choice-grid">
            {GRADE_NUMBERS.map((n) => {
              const label = `${n}${t.grade_suffix}`;
              return (
                <button key={n} className={`choice-btn ${answers.ano === label ? "choice-selected" : ""}`} onClick={() => setAns("ano", label)}>{label}</button>
              );
            })}
          </div>
        )}
        {type === "choice" && key === "tempoEstudoDia" && (
          <div className="choice-grid">
            {t.tempos.map((opt) => (<button key={opt} className={`choice-btn ${answers.tempoEstudoDia === opt ? "choice-selected" : ""}`} onClick={() => setAns("tempoEstudoDia", opt)}>{opt}</button>))}
          </div>
        )}
        {type === "choice" && key === "tempoDeslocacao" && (
          <div className="choice-grid">
            {t.tempos_desloc.map((opt) => (<button key={opt} className={`choice-btn ${answers.tempoDeslocacao === opt ? "choice-selected" : ""}`} onClick={() => setAns("tempoDeslocacao", opt)}>{opt}</button>))}
          </div>
        )}
        {type === "tags" && (
          <div>
            <input ref={inputRef} className="input-field" type="text" placeholder={stepText.placeholder} value={tagInput}
              onChange={(e) => setTagInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addTag(); } }} />
            <div className="tag-row">
              {disciplinas.map((tg) => (<span key={tg} className="tag-chip">{tg}<button className="tag-remove" onClick={() => removeTag(tg)}>×</button></span>))}
            </div>
          </div>
        )}
        {type === "perDisciplinaTags" && disciplinas.length > 0 && (
          <div>
            <input ref={inputRef} className="input-field" type="text" placeholder={stepText.placeholder} value={tagInput}
              onChange={(e) => setTagInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addDificuldade(); } }} />
            <div className="tag-row">
              {((answers.dificuldadesPorDisciplina || {})[disciplinas[subIndex]] || []).map((tg) => (
                <span key={tg} className="tag-chip">{tg}<button className="tag-remove" onClick={() => removeDificuldade(tg)}>×</button></span>
              ))}
            </div>
          </div>
        )}
        {type === "perDisciplina" && disciplinas.length > 0 && (
          <div>
            <div className="choice-grid">
              {t.tempos.map((opt) => (
                <button key={opt} className={`choice-btn ${(answers.tempoPorDisciplina || {})[disciplinas[subIndex]] === opt ? "choice-selected" : ""}`}
                  onClick={() => {
                    const cur = { ...(answers.tempoPorDisciplina || {}) };
                    cur[disciplinas[subIndex]] = opt;
                    setAns("tempoPorDisciplina", cur);
                    if (subIndex < disciplinas.length - 1) setSubIndex(subIndex + 1);
                  }}>{opt}</button>
              ))}
            </div>
          </div>
        )}

        {explainLoading && <div className="explain-box explain-loading">{t.explain_loading}</div>}
        {explain && <div className="explain-box">{explain}</div>}

        <div className="nav-row">
          <button className="ghost-btn" onClick={handleNaoSei} disabled={explainLoading}><IconHelp size={15} /> {t.dont_know}</button>

            {(i > 0 || subIndex > 0) && (<button className="secondary-btn" onClick={back}><IconArrowLeft size={15} /> {t.back}</button>)}

            {type === "perDisciplinaTags" && (<button className="secondary-btn" onClick={skipStep}>{t.skip}</button>)}
            <button className="primary-btn" onClick={next} disabled={!canAdvance()}>
              {i === STEP_ORDER.length - 1 && !((type === "perDisciplinaTags" || type === "perDisciplina") && subIndex < disciplinas.length - 1) ? t.create_plan : t.next} <IconArrowRight size={15} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SubjectDetail({ lang, t, subject, profile, stats, setStats, persistStats, onBack, onStartTest }) {
  const s = stats[subject] || {};

  const [loading, setLoading] = useState(!s.overview);

  useEffect(() => { if (!s.overview) generate(); }, []);

  async function generate() {
    setLoading(true);
    try {
      const dificuldades = (profile.dificuldadesPorDisciplina && profile.dificuldadesPorDisciplina[subject]) || [];
      const dificuldadesTxt = dificuldades.length > 0 ? ` The student has previously mentioned struggling with: ${dificuldades.join(", ")}.` : "";
      const prompt = `A student in ${profile.ano || "an unspecified"} grade, following the "${profile.curriculo || "standard"}" curriculum at "${profile.escola || "their school"}", needs an overview of the subject "${subject}".${dificuldadesTxt} Respond in ${LANG_NAME_FOR_AI[lang]}. Respond with ONLY valid JSON in this exact format: {"topicos_chave": ["...","...","..."], "porque_importa": "1-2 sentences", "como_estudar": "2-3 sentences with concrete study tips for this subject"}`;

      const json = parseJSONLoose(text);
      setOverview(json);
      const nextStats = { ...stats, [subject]: { ...(stats[subject] || {}), overview: json } };
      setStats(nextStats);

      setOverview({ topicos_chave: [], porque_importa: "", como_estudar: "" });

    <div className="page-wrap">

function TestView({ lang, t, config, profile, previousQuestions, weakTopics, onFinish, onCancel }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [answers, setAnswersState] = useState([]);
  const [revealed, setRevealed] = useState(false);
  const [chosen, setChosen] = useState(null);
  const [naoSei, setNaoSei] = useState(false);

  useEffect(() => { generate(); }, []);

  async function generate() {
    setLoading(true); setError("");
    try {
      let n = config.tipo === "mini" ? 5 : 10;
      const hasWeak = weakTopics && weakTopics.length > 0;
      if (hasWeak) n = config.tipo === "mini" ? Math.min(7, n + 2) : Math.min(14, n + 3);
      const avoidTxt = (previousQuestions && previousQuestions.length > 0)
        ? ` Do not repeat any of these previously used questions — write completely new ones with different wording and, where possible, different specific examples: ${JSON.stringify(previousQuestions.slice(-25))}.`
        : "";
      const weakTxt = hasWeak
        ? ` The student has previously struggled with these topics: ${weakTopics.join(", ")}. Dedicate at least half of the questions to these topics, at a level that helps the student practice and improve.`
        : "";
      const prompt = `Create a ${n}-question multiple-choice test on the subject "${config.disciplina}", suitable for a student in ${profile.ano} grade at "${profile.escola}", following the "${profile.curriculo}" curriculum. Match the level and style typical of a real school test for that grade in that curriculum. Each question must have exactly 4 options and only one correct answer. Explanations must be at most 20 words.${weakTxt}${avoidTxt} Respond in ${LANG_NAME_FOR_AI[lang]}. Respond with ONLY valid JSON, no text before or after, in this exact format: {"perguntas":[{"pergunta":"...","opcoes":["...","...","...","..."],"resposta_correta":0,"explicacao":"..."}]}`;
      const text = await callClaude(prompt, 4000);
      const json = parseJSONLoose(text);
      const perguntas = json.perguntas || [];
      if (perguntas.length === 0) throw new Error("No questions generated");
      setQuestions(perguntas);
    } catch (e) { setError(t.could_not_generate); }
    finally { setLoading(false); }
  }

  function selectOption(oIdx) { if (revealed) return; setChosen(oIdx); setRevealed(true); setNaoSei(false); }
  function selectNaoSei() { if (revealed) return; setNaoSei(true); setRevealed(true); setChosen(null); }

  function proceed() {
    const q = questions[idx];
    const correta = chosen === q.resposta_correta;
    const newAnswers = [...answers, { pergunta: q.pergunta, correta, naoSei }];
    setAnswersState(newAnswers);
    setRevealed(false); setChosen(null); setNaoSei(false);
    if (idx < questions.length - 1) setIdx(idx + 1);
    else onFinish(newAnswers, questions);
  }

  if (loading) return (<div className="center-screen"><IconCompass size={32} /><p>{t.preparing_test(config.tipo, config.disciplina)}</p></div>);
  if (error) return (
    <div className="center-screen">
      <p>{error}</p>
      <div className="nav-row" style={{ justifyContent: "center" }}>
        <button className="secondary-btn" onClick={onCancel}>{t.back}</button>
        <button className="primary-btn" onClick={generate}>{t.try_again}</button>
      </div>
    </div>
  );

  const q = questions[idx];
  if (!q) return null;

  return (
    <div className="onboard-screen">
      <div className="progress-row">{questions.map((_, i2) => (<div key={i2} className={`dot ${i2 === idx ? "dot-active" : i2 < idx ? "dot-done" : ""}`} />))}</div>
      <div className="onboard-card">
        <div className="eyebrow">{config.disciplina} · {t.question_of(idx + 1, questions.length)}</div>
        <h2 className="question">{q.pergunta}</h2>
        <div className="option-list">
          {q.opcoes.map((op, oIdx) => {
            let cls = "option-btn";
            if (revealed) {
              if (oIdx === q.resposta_correta) cls += " option-correct";
              else if (oIdx === chosen) cls += " option-wrong";
            }
            return (
              <button key={oIdx} className={cls} onClick={() => selectOption(oIdx)} disabled={revealed}>
                {op}
                {revealed && oIdx === q.resposta_correta && <IconCheck size={16} />}
                {revealed && oIdx === chosen && oIdx !== q.resposta_correta && <IconX size={16} />}
              </button>
            );
          })}
        </div>
        {revealed && <div className="explain-box">{q.explicacao}</div>}
        <div className="nav-row">
          <button className="ghost-btn" onClick={selectNaoSei} disabled={revealed}><IconHelp size={15} /> {t.dont_know}</button>
          <div className="nav-right">
            {revealed && (<button className="primary-btn" onClick={proceed}>{idx === questions.length - 1 ? t.see_result : t.next} <IconArrowRight size={15} /></button>)}
          </div>
        </div>
      </div>
    </div>
  );
}

function ResultView({ lang, t, config, answers, profile, onBack }) {
  const [loading, setLoading] = useState(true);
  const [feedback, setFeedback] = useState(null);
  const pct = Math.round((answers.filter((a) => a.correta).length / answers.length) * 100);

  useEffect(() => { gerarFeedback(); }, []);

  async function gerarFeedback() {
    setLoading(true);
    try {
      const resumo = answers.map((a) => `- ${a.pergunta}: ${a.naoSei ? "didn't know" : a.correta ? "correct" : "incorrect"}`).join("\n");
      const prompt = `A student in ${profile.ano} grade took a test on "${config.disciplina}" and scored ${pct}%. Answers:\n${resumo}\nWrite brief, encouraging feedback (3-4 sentences) about the performance, and identify up to 3 concrete topics the student did well in and up to 3 concrete topics to improve. Respond in ${LANG_NAME_FOR_AI[lang]}. Respond with ONLY JSON: {"feedback":"...","pontos_fortes":["...","..."],"topicos_para_melhorar":["...","..."]}`;
      const text = await callClaude(prompt, 1200);
      const json = parseJSONLoose(text);
      setFeedback(json);
    } catch (e) {
      setFeedback({ feedback: "Well done for finishing the test! Keep practicing to improve even more.", pontos_fortes: [], topicos_para_melhorar: [] });
    } finally { setLoading(false); }
  }

  return (
    <div className="center-screen">
      <div className="result-card">
        <div className="eyebrow">{config.disciplina}</div>
        <div className="result-pct">{pct}%</div>
        <p className="result-count">{t.correct_of(answers.filter((a) => a.correta).length, answers.length)}</p>
        {loading ? <p>{t.feedback_loading}</p> : (
          <>
            <p className="feedback-text">{feedback.feedback}</p>
            {feedback.pontos_fortes && feedback.pontos_fortes.length > 0 && (
              <div className="tag-row" style={{ justifyContent: "center" }}>
                {feedback.pontos_fortes.map((tp, idx) => (<span key={idx} className="tag-chip strength-chip">{tp}</span>))}
              </div>
            )}
            {feedback.topicos_para_melhorar && feedback.topicos_para_melhorar.length > 0 && (
              <div className="tag-row" style={{ justifyContent: "center" }}>
                {feedback.topicos_para_melhorar.map((tp, idx) => (<span key={idx} className="tag-chip weakness-chip">{tp}</span>))}
              </div>
            )}
          </>
        )}
        <button className="primary-btn" style={{ marginTop: 20 }} onClick={() => onBack(pct, feedback)}>{t.back_to_dashboard}</button>
      </div>
    </div>
  );
}

function Agenda({ lang, t, profile, plan, events, setEvents, persistEvents }) {
  const today = new Date();
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(null);
  const [newTitle, setNewTitle] = useState("");
  const [newDate, setNewDate] = useState(today.toISOString().slice(0, 10));
  const [newSubject, setNewSubject] = useState("");

  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  function dateKey(d) { return `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`; }
  function hasEvent(d) { return events.some((e) => e.date === dateKey(d)); }
  const isToday = (d) => dateKey(d) === today.toISOString().slice(0, 10);

  function addEvent() {
    if (!newTitle.trim() || !newDate) return;
    const ev = { id: Date.now().toString(), date: newDate, title: newTitle.trim(), subject: newSubject.trim() };
    const next = [...events, ev];
    setEvents(next); persistEvents(next);
    setNewTitle(""); setNewSubject("");
  }
  function removeEvent(id) {
    const next = events.filter((e) => e.id !== id);
    setEvents(next); persistEvents(next);
  }

  const upcoming = events.slice().sort((a, b) => a.date.localeCompare(b.date));

  return (
    <div className="page-wrap">
      <h1 className="dash-title" style={{ marginBottom: 18 }}>{t.agenda_title}</h1>

      <div className="card">
        <div className="cal-header">
          <button className="cal-nav-btn" onClick={() => setViewDate(new Date(year, month - 1, 1))}><IconChevron dir="left" size={16} /></button>
          <div className="eyebrow" style={{ fontSize: 14 }}>{MONTH_NAMES[lang][month]} {year}</div>
          <button className="cal-nav-btn" onClick={() => setViewDate(new Date(year, month + 1, 1))}><IconChevron dir="right" size={16} /></button>
        </div>
        <div className="cal-grid">
          {DOW_KEYS[lang].map((dw, i) => (<div key={i} className="cal-dow">{dw}</div>))}
          {cells.map((d, i) => {
            if (d === null) return <div key={i} className="cal-day empty" />;
            const key = dateKey(d);
            return (
              <div key={i} className={`cal-day ${isToday(d) ? "today" : ""} ${selectedDate === key ? "selected" : ""}`}
                onClick={() => { setSelectedDate(key); setNewDate(key); }}>
                <span>{d}</span>
                {hasEvent(d) && <span className="cal-dot" />}
              </div>
            );
          })}
        </div>
      </div>

      {plan && plan.plano_semanal && plan.plano_semanal.length > 0 && (
        <div className="card">
          <div className="eyebrow">{t.weekly_routine}</div>
          <div className="week-grid" style={{ marginTop: 10, marginBottom: 0 }}>
            {plan.plano_semanal.map((dia) => (
              <div key={dia.dia} className="day-card">
                <div className="day-label">{dia.dia}</div>
                {dia.blocos.map((b, idx) => (
                  <div key={idx} className="block">
                    <div className="block-disc">{b.disciplina}</div>
                    <div className="block-meta"><IconClock size={12} /> {b.duracao}</div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{ marginBottom: 40 }}>
        <div className="eyebrow">{t.upcoming_events}</div>
        <div className="add-event-form">
          <input className="input-field" type="date" value={newDate} onChange={(e) => setNewDate(e.target.value)} />
          <input className="input-field" type="text" placeholder={t.ev_title_ph} value={newTitle} onChange={(e) => setNewTitle(e.target.value)} />
          <input className="input-field" type="text" placeholder={t.ev_subject_ph} value={newSubject} onChange={(e) => setNewSubject(e.target.value)} />
          <button className="primary-btn" onClick={addEvent}>{t.add_event}</button>
        </div>
        <div style={{ marginTop: 16 }}>
          {upcoming.length === 0 ? <p className="resumo-text">{t.no_events}</p> : upcoming.map((e) => (
            <div key={e.id} className="event-item">
              <div>
                <div className="event-date-badge">{e.date}</div>
                <div className="event-title">{e.title}</div>
                {e.subject && <div className="event-subject"><IconMapPin size={11} /> {e.subject}</div>}
              </div>
              <button className="del-btn" onClick={() => removeEvent(e.id)}><IconX size={16} /></button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

        <div className="settings-grid">
          <div className="field-group"><label className="field-label">{t.name_label}</label><input className="input-field" value={draft.nome || ""} onChange={(e) => setField("nome", e.target.value)} /></div>
          <div className="field-group"><label className="field-label">{t.age_label}</label><input className="input-field" type="number" value={draft.idade || ""} onChange={(e) => setField("idade", e.target.value)} /></div>
          <div className="field-group"><label className="field-label">{t.school_label}</label><input className="input-field" value={draft.escola || ""} onChange={(e) => setField("escola", e.target.value)} /></div>
          <div className="field-group"><label className="field-label">{t.year_label}</label><input className="input-field" value={draft.ano || ""} onChange={(e) => setField("ano", e.target.value)} /></div>
          <div className="field-group"><label className="field-label">{t.curriculum_label}</label><input className="input-field" value={draft.curriculo || ""} onChange={(e) => setField("curriculo", e.target.value)} /></div>
          <div className="field-group"><label className="field-label">{t.location_label}</label><input className="input-field" value={draft.localizacao || ""} onChange={(e) => setField("localizacao", e.target.value)} /></div>
        </div>

        <div className="field-group">
          <label className="field-label">{t.subjects_section}</label>
          <input className="input-field" type="text" placeholder={t.add_subject_ph} value={tagInput}
            onChange={(e) => setTagInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addSubject(); } }} />
          <div className="tag-row">
            {(draft.disciplinas || []).map((tg) => (<span key={tg} className="tag-chip">{tg}<button className="tag-remove" onClick={() => removeSubject(tg)}>×</button></span>))}
          </div>
        </div>

        <div className="save-bar">
          <button className="primary-btn" onClick={save}>{t.save_changes}</button>
          {saved && <span className="saved-msg"><IconCheck size={14} /> {t.saved_confirmation}</span>}
        </div>
      </div>

      <div className="card">
        <button className="secondary-btn" onClick={onLogout}>{t.logout}</button>
      </div>

      <div className="danger-zone">
        <div className="eyebrow" style={{ color: "var(--error)" }}>{t.danger_zone}</div>
        {!confirmingReset ? (
          <button className="secondary-btn" style={{ marginTop: 10 }} onClick={() => setConfirmingReset(true)}>{t.reset_data}</button>
        ) : (
          <div style={{ marginTop: 10 }}>
            <p className="resumo-text">{t.reset_confirm}</p>
            <div className="nav-row" style={{ marginTop: 0, justifyContent: "flex-start" }}>
              <button className="danger-btn" onClick={onReset}>{t.reset_button}</button>
              <button className="secondary-btn" onClick={() => setConfirmingReset(false)}>{t.cancel}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- Admin ----------------

function AdminPanel({ t }) {
  const [stripeId, setStripeId] = useState("");
  const [saved, setSaved] = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    try {
      const res = await window.storage.get("compass-admin-settings", true);
      if (res && res.value) {
        const parsed = JSON.parse(res.value);
        setStripeId(parsed.stripeAccountId || "");
      }
    } catch (e) {
      // no settings saved yet
    }
  }

  async function save() {
    try {
      await window.storage.set("compass-admin-settings", JSON.stringify({ stripeAccountId: stripeId.trim() }), true);
      setSaved(true);
    } catch (e) { console.error("Save admin settings error", e); }
  }

  return (
    <div className="page-wrap" style={{ paddingBottom: 40 }}>
      <h1 className="dash-title" style={{ marginBottom: 18 }}>{t.admin_title}</h1>
      <div className="card">
        <p className="resumo-text">{t.admin_access_note}</p>
        <div className="field-group">
          <label className="field-label">{t.stripe_account_label}</label>
          <input className="input-field" type="text" placeholder={t.stripe_account_ph} value={stripeId}
            onChange={(e) => { setStripeId(e.target.value); setSaved(false); }} />
        </div>
        <div className="save-bar">
          <button className="primary-btn" onClick={save}>{t.stripe_save}</button>
          {saved && <span className="saved-msg"><IconCheck size={14} /> {t.stripe_saved}</span>}
        </div>
      </div>
    </div>
  );
}

// ---------------- Main App ----------------

function App() {
  const [lang, setLangState] = useState("en");
  const [view, setView] = useState("loading");
  const [account, setAccount] = useState(null);
  const [answers, setAnswers] = useState({});
  const [plan, setPlan] = useState(null);
  const [stats, setStats] = useState({});
  const [events, setEvents] = useState([]);
  const [planLoading, setPlanLoading] = useState(false);
  const [testConfig, setTestConfig] = useState(null);
  const [testAnswers, setTestAnswers] = useState(null);
  const [testQuestionsAsked, setTestQuestionsAsked] = useState([]);
  const [activeSubject, setActiveSubject] = useState(null);

  const t = T[lang];
  const PROTECTED_VIEWS = ["dashboard", "agenda", "subject", "test", "result"];

  useEffect(() => {
    (async () => {
      const sessionUser = await loadSession();
      if (sessionUser) {
        const acc = await loadAccount(sessionUser);
        if (acc) { await afterAuth(acc); return; }
      }
      setView("auth");
    })();
  }, []);

  async function afterAuth(acc) {
    setAccount(acc);
    setAnswers(acc.profile || {});
    setPlan(acc.plan || null);
    setStats(acc.stats || {});
    setEvents(acc.events || []);
    setLangState(acc.lang || "en");
    if (acc.profile && acc.profile.nome) {
      setView(computeAccess(acc) ? "dashboard" : "paywall");
    } else {
      setView("onboarding");
    }
  }

  function setLang(l) {
    setLangState(l);
    persist({ lang: l });
  }

  function requestView(v) {
    if (PROTECTED_VIEWS.includes(v) && account && !computeAccess(account)) { setView("paywall"); return; }
    setView(v);
  }

  async function persist(partial) {
    if (!account) return;
    const merged = {
      ...account,
      profile: partial.profile !== undefined ? partial.profile : answers,
      plan: partial.plan !== undefined ? partial.plan : plan,
      stats: partial.stats !== undefined ? partial.stats : stats,
      events: partial.events !== undefined ? partial.events : events,
      lang: partial.lang !== undefined ? partial.lang : lang,
    };
    setAccount(merged);
    await saveAccount(merged);
  }

  async function gerarPlano(profileData) {
    setPlanLoading(true);
    try {
      const prompt = `Create a weekly study plan for a student with this data: ${JSON.stringify(profileData)}. Take into account how much they already study per day and per subject, their grade and curriculum, and especially any specific difficulty topics they mentioned per subject (dificuldadesPorDisciplina) — give those subjects more time and more targeted focus. Be realistic and don't overload the student. Respond in ${LANG_NAME_FOR_AI[lang]}. Respond with ONLY valid JSON in this exact format: {"resumo":"1-2 sentences about the overall strategy","plano_semanal":[{"dia":"Monday","blocos":[{"disciplina":"...","duracao":"30 min","foco":"..."}]}],"dicas":["...","...","..."]}. Include 5 days (Monday to Friday), with day names translated into ${LANG_NAME_FOR_AI[lang]}.`;
      const text = await callClaude(prompt, 3000);
      const json = parseJSONLoose(text);
      setPlan(json);
      await persist({ profile: profileData, plan: json });
    } catch (e) {
      setPlan({ resumo: "I couldn't generate the plan right now — try again anytime.", plano_semanal: [], dicas: [] });
    } finally { setPlanLoading(false); }
  }

  async function handleOnboardingFinish() {
    await persist({ profile: answers });
    requestView(computeAccess(account) ? "dashboard" : "paywall");
    gerarPlano(answers);
  }

  function startTest(disciplina, tipo) { setTestConfig({ disciplina, tipo }); setActiveSubject(null); requestView("test"); }
  function handleTestFinish(finalAnswers, questions) { setTestAnswers(finalAnswers); setTestQuestionsAsked(questions || []); requestView("result"); }

  async function handleResultBack(pct, feedback) {
    const nextStats = { ...stats };
    const key = testConfig.disciplina;
    const historico = (nextStats[key] && nextStats[key].historico) || [];
    const askedPrev = (nextStats[key] && nextStats[key].askedQuestions) || [];
    const newAskedTexts = (testQuestionsAsked || []).map((q) => q.pergunta).filter(Boolean);
    nextStats[key] = {
      ...(nextStats[key] || {}),
      percentagem: pct,
      historico: [...historico, {
        data: new Date().toISOString().slice(0, 10),
        tipo: testConfig.tipo,
        percentagem: pct,
        topicos_fortes: feedback ? (feedback.pontos_fortes || []) : [],
        topicos_fracos: feedback ? (feedback.topicos_para_melhorar || []) : [],
      }],
      askedQuestions: [...askedPrev, ...newAskedTexts].slice(-60),
    };
    setStats(nextStats);
    await persist({ stats: nextStats });
    requestView("dashboard");
  }

  async function handleReset() {
    const nextAccount = { ...account, profile: {}, plan: null, stats: {}, events: [] };
    setAccount(nextAccount);
    await saveAccount(nextAccount);
    setAnswers({}); setPlan(null); setStats({}); setEvents([]);
    setView("onboarding");
  }

  async function handleSubscribe(planKey, finalPrice, promoCode, isOneTime) {
    const nextAccount = {
      ...account,
      subscription: { active: true, plan: planKey, price: finalPrice, promo: promoCode || null },
      usedPromos: isOneTime && promoCode ? [...(account.usedPromos || []), promoCode] : (account.usedPromos || []),
    };
    setAccount(nextAccount);
    await saveAccount(nextAccount);
    setView("dashboard");
  }

  async function handleLogout() {
    await clearSession();
    setAccount(null); setAnswers({}); setPlan(null); setStats({}); setEvents([]);
    setView("auth");
  }

  const isAdmin = isAdminUser(account);
  const showNav = ["dashboard", "agenda", "settings", "subject", "paywall", "admin"].includes(view);
  const showTrialBanner = ["dashboard", "agenda", "subject"].includes(view) && account && computeAccess(account) && !(account.subscription && account.subscription.active);

  return (
    <div className="app-root">
      {showNav && (
        <TopNav lang={lang} t={t} view={view === "subject" ? "dashboard" : view} setView={requestView}
          username={account && account.username} onLogout={handleLogout} isAdmin={isAdmin} />
      )}

      {view === "loading" && (<div className="center-screen"><IconCompass size={32} /><p>{t.opening}</p></div>)}

      {view === "auth" && (
        <AuthView t={t} lang={lang} setLang={setLangState} onAuth={afterAuth} />
      )}

      {view === "paywall" && account && (
        <>
          <div className="page-wrap"><TrialBanner t={t} account={account} onGoPaywall={() => {}} /></div>
          <Paywall t={t} account={account} onSubscribe={handleSubscribe} />
        </>
      )}

      {view === "onboarding" && (
        <Onboarding lang={lang} t={t} answers={answers} setAnswers={setAnswers} onFinish={handleOnboardingFinish} />
      )}

      {view === "dashboard" && account && (
        <div className="page-wrap"><TrialBanner t={t} account={account} onGoPaywall={() => setView("paywall")} /></div>
      )}
      {view === "dashboard" && account && (
        <Dashboard lang={lang} t={t} profile={answers} plan={plan} stats={stats} planLoading={planLoading}
          onStartTest={startTest}
          onOpenSubject={(d) => { setActiveSubject(d); requestView("subject"); }}
          onRegeneratePlan={() => gerarPlano(answers)} />
      )}

      {view === "subject" && activeSubject && account && (
        <>
          <div className="page-wrap"><TrialBanner t={t} account={account} onGoPaywall={() => setView("paywall")} /></div>
          <SubjectDetail lang={lang} t={t} subject={activeSubject} profile={answers} stats={stats} setStats={setStats}
            persistStats={(next) => persist({ stats: next })}
            onBack={() => requestView("dashboard")} onStartTest={startTest} />
        </>
      )}

      {view === "agenda" && account && (
        <>
          <div className="page-wrap"><TrialBanner t={t} account={account} onGoPaywall={() => setView("paywall")} /></div>
          <Agenda lang={lang} t={t} profile={answers} plan={plan} events={events} setEvents={setEvents}
            persistEvents={(next) => persist({ events: next })} />
        </>
      )}

      {view === "settings" && (
        <Settings lang={lang} setLang={setLang} t={t} profile={answers} setProfile={setAnswers}
          persistProfile={(next) => persist({ profile: next })} onReset={handleReset}
          account={account} onGoPaywall={() => setView("paywall")} onLogout={handleLogout} />
      )}

      {view === "admin" && account && (
        isAdmin ? <AdminPanel t={t} /> : (<div className="center-screen"><p>{t.admin_not_authorized}</p></div>)
      )}

      {view === "test" && testConfig && (
        <TestView lang={lang} t={t} config={testConfig} profile={answers}
          previousQuestions={(stats[testConfig.disciplina] && stats[testConfig.disciplina].askedQuestions) || []}
          weakTopics={getWeakTopics(stats, testConfig.disciplina, answers)}
          onFinish={handleTestFinish} onCancel={() => requestView("dashboard")} />
      )}

      {view === "result" && testConfig && testAnswers && (
        <ResultView lang={lang} t={t} config={testConfig} answers={testAnswers} profile={answers} onBack={handleResultBack} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
